 <style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');

  :root {
   --bg-color: #0f0f13;
   --text-color: #ffffff;
   --primary: #db9a00;
   --primary-hover: #ffb81c;
   --card-bg: rgba(255, 255, 255, 0.05);
   --card-border: rgba(255, 255, 255, 0.1);
  }

  body {
   font-family: 'Poppins', sans-serif;
   margin: 0;
   padding: 0;
   background-color: var(--bg-color);
   color: var(--text-color);
   background-image: radial-gradient(circle at 50% 0%, #2a1f00 0%, transparent 50%);
   min-height: 100vh;
   display: flex;
   flex-direction: column;
   align-items: center;
  }

  .container {
   width: 100%;
   max-width: 600px;
   padding: 40px 20px;
   box-sizing: border-box;
   display: flex;
   flex-direction: column;
   align-items: center;
   animation: fadeIn 0.8s ease-out;
  }

  @keyframes fadeIn {
   from { opacity: 0; transform: translateY(20px); }
   to { opacity: 1; transform: translateY(0); }
  }

  .profile {
   text-align: center;
   margin-bottom: 40px;
  }

  .profile h1 {
   font-size: 2.5rem;
   margin: 0 0 10px 0;
   font-weight: 800;
   background: linear-gradient(45deg, #fff, var(--primary));
   -webkit-background-clip: text;
   -webkit-text-fill-color: transparent;
   letter-spacing: 1px;
  }

  .profile p {
   color: #a0a0a0;
   margin: 0;
   font-size: 1.1rem;
  }

  .links-grid {
   display: flex;
   flex-direction: column;
   gap: 16px;
   width: 100%;
  }

  .btn {
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   width: 100%;
   padding: 18px 24px;
   border-radius: 16px;
   background: var(--card-bg);
   border: 1px solid var(--card-border);
   color: var(--text-color);
   text-decoration: none;
   font-size: 18px;
   font-weight: 600;
   transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
   backdrop-filter: blur(10px);
   box-sizing: border-box;
   position: relative;
   overflow: hidden;
  }

  .btn::before {
   content: '';
   position: absolute;
   top: 0; left: 0; right: 0; bottom: 0;
   background: linear-gradient(45deg, transparent, rgba(219, 154, 0, 0.1), transparent);
   transform: translateX(-100%);
   transition: transform 0.6s;
  }

  .btn:hover::before {
   transform: translateX(100%);
  }

  .btn:hover {
   background: rgba(255, 255, 255, 0.1);
   border-color: var(--primary);
   transform: translateY(-4px);
   box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(219, 154, 0, 0.2);
  }

  .btn-label {
   font-size: 12px;
   font-weight: 400;
   color: var(--primary);
   margin-top: 4px;
   text-transform: uppercase;
   letter-spacing: 1px;
  }

  .featured-btn {
   background: linear-gradient(135deg, rgba(219, 154, 0, 0.2), rgba(219, 154, 0, 0.05));
   border-color: rgba(219, 154, 0, 0.3);
  }
  
  .featured-btn:hover {
   background: linear-gradient(135deg, rgba(219, 154, 0, 0.3), rgba(219, 154, 0, 0.1));
  }
 </style>
</head>
