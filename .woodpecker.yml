when:
  - event: [push, manual]

labels:
  hostname: catarchy2

steps:
  notify_start:
    image: curlimages/curl:8.16.0
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "$${TELEGRAM_BOT_TOKEN}"
      - test -n "$${TELEGRAM_CHAT_ID}"
      - |
        message="🚀 ${CI_REPO}
        Deployment started at $$(date -u +%H:%M:%S) UTC.
        Branch: ${CI_COMMIT_BRANCH}
        Pipeline: #${CI_PIPELINE_NUMBER}
        Commit: ${CI_COMMIT_SHA}"
        curl -sS -X POST \
          "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="$${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=$${message}"

  verify_project_files:
    image: alpine:3.22
    commands:
      - test -f package.json
      - test -f package-lock.json
      - test -f astro.config.mjs
      - test -f src/pages/index.astro
      - grep -q "insta.catarchy.space" README.md

  build_site:
    image: node:22-alpine
    commands:
      - npm ci
      - npm run build

  deploy_site:
    image: alpine:3.22
    commands:
      - test -f dist/index.html
      - find /deploy -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      - cp -a dist/. /deploy/
      - test -f /deploy/index.html
    volumes:
      - /var/www/insta.catarchy.space/html:/deploy

  notify_success:
    image: curlimages/curl:8.16.0
    when:
      - status: success
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "$${TELEGRAM_BOT_TOKEN}"
      - test -n "$${TELEGRAM_CHAT_ID}"
      - |
        message="✅ ${CI_REPO}
        Deployment finished at $$(date -u +%H:%M:%S) UTC.
        Branch: ${CI_COMMIT_BRANCH}
        Pipeline: #${CI_PIPELINE_NUMBER}
        Commit: ${CI_COMMIT_SHA}"
        curl -sS -X POST \
          "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="$${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=$${message}"

  notify_failure:
    image: curlimages/curl:8.16.0
    when:
      - status: failure
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "$${TELEGRAM_BOT_TOKEN}"
      - test -n "$${TELEGRAM_CHAT_ID}"
      - |
        message="❌ ${CI_REPO}
        Deployment failed at $$(date -u +%H:%M:%S) UTC.
        Branch: ${CI_COMMIT_BRANCH}
        Pipeline: #${CI_PIPELINE_NUMBER}
        Commit: ${CI_COMMIT_SHA}"
        curl -sS -X POST \
          "https://api.telegram.org/bot$${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d chat_id="$${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=$${message}"
