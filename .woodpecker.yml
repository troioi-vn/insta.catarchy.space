when:
  - event: [push, manual]

steps:
  verify_docker_files:
    image: alpine:3.22
    commands:
      - test -f Dockerfile
      - grep -q "^FROM nginx:alpine$" Dockerfile
      - grep -q '^      - "8080:80"$' docker-compose.yml

  verify_files:
    image: alpine:3.22
    commands:
      - test -f index.html
      - test -f Dockerfile
      - grep -q "insta.catarchy.space" README.md
