when:
  - event: [push, manual]

steps:
  notify_start:
    image: curlimages/curl:8.16.0
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "${TELEGRAM_BOT_TOKEN}"
      - test -n "${TELEGRAM_CHAT_ID}"
      - >
        curl -sS -X POST
        "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
        -d chat_id="${TELEGRAM_CHAT_ID}"
        -d text="STARTED: ${CI_REPO} | branch=${CI_COMMIT_BRANCH} | pipeline=#${CI_PIPELINE_NUMBER} | commit=${CI_COMMIT_SHA}"

  debug_secret_presence:
    image: alpine:3.22
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "${TELEGRAM_BOT_TOKEN}"
      - test -n "${TELEGRAM_CHAT_ID}"

  verify_docker_files:
    image: alpine:3.22
    commands:
      - test -f Dockerfile
      - grep -q "^FROM nginx:alpine$" Dockerfile
      - grep -q '^      - "8080:80"$' docker-compose.yml

  verify_files:
    image: alpine:3.22
    commands:
      - test -f index.html
      - test -f Dockerfile
      - grep -q "insta.catarchy.space" README.md

  notify_success:
    image: curlimages/curl:8.16.0
    when:
      - status: success
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "${TELEGRAM_BOT_TOKEN}"
      - test -n "${TELEGRAM_CHAT_ID}"
      - >
        curl -sS -X POST
        "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
        -d chat_id="${TELEGRAM_CHAT_ID}"
        -d text="SUCCESS: ${CI_REPO} | branch=${CI_COMMIT_BRANCH} | pipeline=#${CI_PIPELINE_NUMBER} | commit=${CI_COMMIT_SHA}"

  notify_failure:
    image: curlimages/curl:8.16.0
    when:
      - status: failure
    environment:
      TELEGRAM_BOT_TOKEN:
        from_secret: TELEGRAM_BOT_TOKEN
      TELEGRAM_CHAT_ID:
        from_secret: TELEGRAM_CHAT_ID
    commands:
      - test -n "${TELEGRAM_BOT_TOKEN}"
      - test -n "${TELEGRAM_CHAT_ID}"
      - >
        curl -sS -X POST
        "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
        -d chat_id="${TELEGRAM_CHAT_ID}"
        -d text="FAILED: ${CI_REPO} | branch=${CI_COMMIT_BRANCH} | pipeline=#${CI_PIPELINE_NUMBER} | commit=${CI_COMMIT_SHA}"
