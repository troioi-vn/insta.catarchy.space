when:
  - event: [push, manual]

labels:
  hostname: catarchy2

steps:
  notify_start:
    image: curlimages/curl:8.16.0
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        start_epoch="$$(date -u +%s)"
        start_utc="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        commit_message_json="$$(printf '%s\n' "${CI_COMMIT_MESSAGE}" | awk 'NR == 1 { gsub(/\t/, " "); gsub(/  +/, " "); sub(/^ /, ""); sub(/ $/, ""); gsub(/\\/, "\\\\"); gsub(/"/, "\\\""); print; exit }')"
        printf '%s\n' "$$start_epoch" > .woodpecker-deploy-start-epoch

        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "start",
          "status": "started",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_message": "$$commit_message_json",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "catarchy2",
          "site": "insta.catarchy.space",
          "started_at_utc": "$$start_utc",
          "started_at_unix": $$start_epoch,
          "sent_at_utc": "$$start_utc"
        }
        EOF

  verify_project_files:
    image: alpine:3.22
    commands:
      - test -f package.json
      - test -f package-lock.json
      - test -f astro.config.mjs
      - test -f src/pages/index.astro
      - grep -q "insta.catarchy.space" README.md

  build_site:
    image: node:22-alpine
    commands:
      - npm ci
      - npm run build

  deploy_site:
    image: alpine:3.22
    commands:
      - test -f dist/index.html
      - find /deploy -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      - cp -a dist/. /deploy/
      - test -f /deploy/index.html
    volumes:
      - /var/www/insta.catarchy.space/html:/deploy

  notify_success:
    image: curlimages/curl:8.16.0
    when:
      - status: success
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        finish_epoch="$$(date -u +%s)"
        finish_utc="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        start_epoch="$$(cat .woodpecker-deploy-start-epoch 2>/dev/null || true)"
        commit_message_json="$$(printf '%s\n' "${CI_COMMIT_MESSAGE}" | awk 'NR == 1 { gsub(/\t/, " "); gsub(/  +/, " "); sub(/^ /, ""); sub(/ $/, ""); gsub(/\\/, "\\\\"); gsub(/"/, "\\\""); print; exit }')"
        if [ -n "$$start_epoch" ]; then
          duration_seconds=$$((finish_epoch - start_epoch))
        else
          duration_seconds=null
        fi

        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "finish",
          "status": "success",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_message": "$$commit_message_json",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "catarchy2",
          "site": "insta.catarchy.space",
          "finished_at_utc": "$$finish_utc",
          "finished_at_unix": $$finish_epoch,
          "duration_seconds": $$duration_seconds,
          "sent_at_utc": "$$finish_utc"
        }
        EOF
      - rm -f .woodpecker-deploy-start-epoch

  notify_failure:
    image: curlimages/curl:8.16.0
    when:
      - status: failure
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        finish_epoch="$$(date -u +%s)"
        finish_utc="$$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        start_epoch="$$(cat .woodpecker-deploy-start-epoch 2>/dev/null || true)"
        commit_message_json="$$(printf '%s\n' "${CI_COMMIT_MESSAGE}" | awk 'NR == 1 { gsub(/\t/, " "); gsub(/  +/, " "); sub(/^ /, ""); sub(/ $/, ""); gsub(/\\/, "\\\\"); gsub(/"/, "\\\""); print; exit }')"
        if [ -n "$$start_epoch" ]; then
          duration_seconds=$$((finish_epoch - start_epoch))
        else
          duration_seconds=null
        fi

        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "finish",
          "status": "failure",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_message": "$$commit_message_json",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "catarchy2",
          "site": "insta.catarchy.space",
          "finished_at_utc": "$$finish_utc",
          "finished_at_unix": $$finish_epoch,
          "duration_seconds": $$duration_seconds,
          "sent_at_utc": "$$finish_utc"
        }
        EOF
      - rm -f .woodpecker-deploy-start-epoch
