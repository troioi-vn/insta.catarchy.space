when:
  - event: [push, manual]

steps:
  build_image:
    image: docker:cli
    commands:
      - docker build -t insta-cararchy-space:${CI_COMMIT_SHA} .

  verify_files:
    image: alpine:3.22
    commands:
      - test -f index.html
      - test -f Dockerfile
      - grep -q "insta.cararchy.space" README.md
