when:
  - event: [push, manual]

labels:
  hostname: catarchy2

steps:
  notify_start:
    image: curlimages/curl:8.16.0
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "start",
          "status": "started",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "catarchy2",
          "site": "insta.catarchy.space",
          "sent_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF

  verify_project_files:
    image: alpine:3.22
    commands:
      - test -f package.json
      - test -f package-lock.json
      - test -f astro.config.mjs
      - test -f src/pages/index.astro
      - grep -q "insta.catarchy.space" README.md

  build_site:
    image: node:22-alpine
    commands:
      - npm ci
      - npm run build

  deploy_site:
    image: alpine:3.22
    commands:
      - test -f dist/index.html
      - find /deploy -mindepth 1 -maxdepth 1 -exec rm -rf {} +
      - cp -a dist/. /deploy/
      - test -f /deploy/index.html
    volumes:
      - /var/www/insta.catarchy.space/html:/deploy

  notify_success:
    image: curlimages/curl:8.16.0
    when:
      - status: success
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "finish",
          "status": "success",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "catarchy2",
          "site": "insta.catarchy.space",
          "sent_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF

  notify_failure:
    image: curlimages/curl:8.16.0
    when:
      - status: failure
    environment:
      N8N_WEBHOOK_URL:
        from_secret: N8N_WEBHOOK_URL
      N8N_WEBHOOK_NAME:
        from_secret: N8N_WEBHOOK_NAME
      N8N_WEBHOOK_TOKEN:
        from_secret: N8N_WEBHOOK_TOKEN
    commands:
      - test -n "$${N8N_WEBHOOK_URL}"
      - test -n "$${N8N_WEBHOOK_NAME}"
      - test -n "$${N8N_WEBHOOK_TOKEN}"
      - |
        curl -sS -X POST \
          "$${N8N_WEBHOOK_URL}" \
          -H "$${N8N_WEBHOOK_NAME}: $${N8N_WEBHOOK_TOKEN}" \
          -H "Content-Type: application/json" \
          --data @- <<EOF
        {
          "event": "deploy",
          "phase": "finish",
          "status": "failure",
          "source": "woodpecker",
          "repo": "${CI_REPO}",
          "branch": "${CI_COMMIT_BRANCH}",
          "pipeline_number": "${CI_PIPELINE_NUMBER}",
          "commit_sha": "${CI_COMMIT_SHA}",
          "target": "catarchy2",
          "site": "insta.catarchy.space",
          "sent_at_utc": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        }
        EOF
